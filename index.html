<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🩺 Diabetes Prediction</h1>
            <p>Enter your health metrics to predict diabetes risk</p>
        </div>

        <form id="predictionForm">
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="Gender" required>
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
                <span class="hint">Select your gender</span>
            </div>

            <div class="form-group" id="pregnanciesGroup">
                <label for="pregnancies">Pregnancies</label>
                <input type="number" id="pregnancies" name="Pregnancies" min="0" max="20" value="2" required>
                <span class="hint">Number of times pregnant</span>
            </div>

            <div class="form-group">
                <label for="glucose">Glucose (mg/dL)</label>
                <input type="number" id="glucose" name="Glucose" min="0" max="300" step="0.1" value="130" required>
                <span class="hint">Plasma glucose concentration</span>
            </div>

            <div class="form-group">
                <label for="bloodPressure">Blood Pressure (mm Hg)</label>
                <input type="number" id="bloodPressure" name="BloodPressure" min="0" max="200" step="0.1" value="70" required>
                <span class="hint">Diastolic blood pressure</span>
            </div>

            <div class="form-group">
                <label for="bmi">BMI (kg/m²)</label>
                <input type="number" id="bmi" name="BMI" min="0" max="70" step="0.1" value="28.5" required>
                <span class="hint">Body mass index</span>
            </div>

            <div class="form-group">
                <label for="age">Age (years)</label>
                <input type="number" id="age" name="Age" min="1" max="120" value="45" required>
                <span class="hint">Age in years</span>
            </div>

            <button type="submit" class="btn-predict">Predict</button>
        </form>

        <div id="result" class="result hidden">
            <div class="result-content">
                <div class="result-icon" id="resultIcon"></div>
                <h2 id="resultTitle"></h2>
                <p id="resultMessage"></p>
            </div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Analyzing...</p>
        </div>
    </div>

 
</body>
</html>
